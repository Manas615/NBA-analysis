name: NBA Agentic AI — CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install ruff mypy
          pip install -r requirements.txt
      - name: Lint with ruff
        run: ruff check .
      - name: Type check with mypy
        run: mypy agents/ tools/ api/ --ignore-missing-imports

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nba
          POSTGRES_PASSWORD: nba_password
          POSTGRES_DB: nba_trades
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nba"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        env:
          DATABASE_URL: "postgresql+asyncpg://nba:nba_password@localhost:5432/nba_trades"
          REDIS_URL: "redis://localhost:6379/0"
          OPENAI_API_KEY: "sk-test-fake-key"
          APP_ENV: test
        run: pytest tests/ -v --tb=short

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t nba-agentic-ai:${{ github.sha }} .
      - name: Test Docker health
        run: |
          docker run -d --name nba-test -p 8000:8000 \
            -e OPENAI_API_KEY=sk-test \
            -e DATABASE_URL=sqlite+aiosqlite:///test.db \
            nba-agentic-ai:${{ github.sha }}
          sleep 5
          curl -f http://localhost:8000/ || exit 1
          docker stop nba-test
